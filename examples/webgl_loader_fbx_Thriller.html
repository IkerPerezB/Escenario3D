<!DOCTYPE html>
<html lang="en">
    <head>
        <title>three.js webgl - FBX loader</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
        <link type="text/css" rel="stylesheet" href="main.css">
    </head>

    <body>
        <div id="info">
            <a href="https://threejs.org" target="_blank" rel="noopener">three.js</a> - FBXLoader<br />
            Character and animation from <a href="https://www.mixamo.com/" target="_blank" rel="noopener">Mixamo</a>
        </div>

        <script type="importmap">
            {
                "imports": {
                    "three": "../build/three.module.js",
                    "three/addons/": "./jsm/"
                }
            }
        </script>

        <script type="module">

            import * as THREE from 'three';
            import Stats from 'three/addons/libs/stats.module.js';
            import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
            import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
            import { GUI } from 'three/addons/libs/lil-gui.module.min.js';
            import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';
            import { Audio, AudioListener, AudioLoader } from 'three';

            const manager = new THREE.LoadingManager();
            let camera, scene, renderer, stats, object, loader, guiMorphsFolder;
            let mixer, miTextura; // miTextura ahora es global para que loadAsset la vea

            const clock = new THREE.Clock();
            const params = { asset: 'Strafe' };
            const assets = ['Thriller Part 3', 'Reloading','Gunplay','Strafe'];

            init(); 

            function init() {
                const container = document.createElement('div');
                document.body.appendChild(container);

                camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 2000);
                camera.position.set(100, 200, 300);

                scene = new THREE.Scene();
                scene.background = new THREE.Color(0xa0a0a0);
                scene.fog = new THREE.Fog(0xa0a0a0, 200, 1000);

                // Luces
                const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
                hemiLight.position.set(0, 200, 0);
                scene.add(hemiLight);

                const dirLight = new THREE.DirectionalLight(0xffffff, 1);
                dirLight.position.set(0, 200, 100);
                dirLight.castShadow = true;
                scene.add(dirLight);

                // --- CARGA DE TEXTURAS (Nuevo Pasto PBR) ---
                const textureLoader = new THREE.TextureLoader();
                
                // Cargamos los mapas que descargaste
                const colorMap = textureLoader.load('models/textures/Poliigon_GrassPatchyGround_4585_BaseColor.jpg');
                const normalMap = textureLoader.load('models/textures/Poliigon_GrassPatchyGround_4585_Normal.png');
                const roughnessMap = textureLoader.load('models/textures/Poliigon_GrassPatchyGround_4585_Roughness.jpg');
                const aoMap = textureLoader.load('models/textures/Poliigon_GrassPatchyGround_4585_AmbientOcclusion.jpg');

                // miTextura = textureLoader.load('models/textures/rojo.jpg'); // Tu textura roja

                // Hacemos que todas las texturas se repitan en sincronía
                [colorMap, normalMap, roughnessMap, aoMap].forEach(tex => {
                    tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
                    tex.repeat.set(25, 25);
                });

                // Suelo con pasto realista (MeshStandardMaterial)
                const groundMaterial = new THREE.MeshStandardMaterial({ 
                    map: colorMap,
                    normalMap: normalMap,
                    roughnessMap: roughnessMap,
                    aoMap: aoMap,
					metalness: 0.0,     
    				roughness: 1.0,
                    depthWrite: false 
                });
                
                const mesh = new THREE.Mesh(new THREE.PlaneGeometry(2000, 2000), groundMaterial);
                mesh.rotation.x = -Math.PI / 2;
                mesh.receiveShadow = true;
                scene.add(mesh);

                // Cuadrícula (Grid)
                const grid = new THREE.GridHelper(2000, 20, 0x000000, 0x000000);
                grid.material.opacity = 0.2;
                grid.material.transparent = true;
                scene.add(grid);

                // --- CARGA DEL MODELO ---
                loader = new FBXLoader(manager);
                loadAsset(params.asset);

                // --- RENDERER ---
                renderer = new THREE.WebGLRenderer({ antialias: true });
                renderer.setPixelRatio(window.devicePixelRatio);
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setAnimationLoop(animate);
                renderer.shadowMap.enabled = true;
                container.appendChild(renderer.domElement);
				renderer.toneMapping = THREE.ACESFilmicToneMapping; // Da un look de cine
				renderer.toneMappingExposure = 0.8;

                const controls = new OrbitControls(camera, renderer.domElement);
                controls.target.set(0, 100, 0);
                controls.update();

                window.addEventListener('resize', onWindowResize);
                stats = new Stats();
                container.appendChild(stats.dom);

                // --- MENÚ GUI (Selector de objetos) ---
                const gui = new GUI();
                gui.add(params, 'asset', assets).onChange(function (value) {
                    loadAsset(value);
                });
                guiMorphsFolder = gui.addFolder('Morphs').hide();

                // --- ENTORNO HDR ---
                const rgbeLoader = new RGBELoader();
                rgbeLoader.load('models/rgbe/preller_drive_4k.hdr', function (texture) {
                    texture.mapping = THREE.EquirectangularReflectionMapping;
                    scene.background = texture;
                    scene.environment = texture;
                });

                // --- AUDIO (Thriller) ---
                const listener = new AudioListener();
                camera.add(listener);
                const sound = new Audio(listener);
                const audioLoader = new AudioLoader();
                audioLoader.load('models/rgbe/Michael Jackson - Thriller (Official Video - Shortened Version).mp3', function (buffer) {
                    sound.setBuffer(buffer);
                    sound.setLoop(true);
                    sound.setVolume(0.5);
                    // El navegador requiere un clic para sonar:
                    window.addEventListener('click', () => { if(!sound.isPlaying) sound.play(); }, { once: true });
                });
            }

            function loadAsset(asset) {
                loader.load('models/fbx/' + asset + '.fbx', function (group) {
                    if (object) {
                        object.traverse(function (child) {
                            if (child.material) {
                                const materials = Array.isArray(child.material) ? child.material : [child.material];
                                materials.forEach(m => {
                                    if (m.map) m.map.dispose();
                                    m.dispose();
                                });
                            }
                            if (child.geometry) child.geometry.dispose();
                        });
                        scene.remove(object);
                    }

                    object = group;

                    if (object.animations && object.animations.length) {
                        mixer = new THREE.AnimationMixer(object);
                        mixer.clipAction(object.animations[0]).play();
                    }

                    guiMorphsFolder.children.forEach((child) => child.destroy());
                    guiMorphsFolder.hide();

                    // Aplicamos tu textura roja a cada parte del modelo
                    object.traverse(function (child) {
                        if (child.isMesh) {
                            child.castShadow = true;
                            child.receiveShadow = true;
                            
                            // AQUÍ SE APLICA TU TEXTURA ROJA
                            child.material = new THREE.MeshPhongMaterial({ 
                                map: miTextura, 
                                shininess: 100, 
                                specular: 0x444444 
                            });

                            if (child.morphTargetDictionary) {
                                guiMorphsFolder.show();
                                const meshFolder = guiMorphsFolder.addFolder(child.name || child.uuid);
                                Object.keys(child.morphTargetDictionary).forEach((key) => {
                                    meshFolder.add(child.morphTargetInfluences, child.morphTargetDictionary[key], 0, 1, 0.01);
                                });
                            }
                        }
                    });

                    scene.add(object);
                });
            }

            function onWindowResize() {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }

            function animate() {
                const delta = clock.getDelta();
                if (mixer) mixer.update(delta);
                renderer.render(scene, camera);
                stats.update();
            }

        </script>
    </body>
</html>
